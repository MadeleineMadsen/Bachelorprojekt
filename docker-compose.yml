services:
  web:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: bachelor
    depends_on:
      - mariadb
    ports:
      - 80:80
    volumes:
      - .:/var/www/html
      - ./docker/php/php.ini:/usr/local/etc/php/php.ini


  mariadb:
    image: mariadb:10.6.20
    container_name: bachelor_db
    environment:
      MYSQL_ROOT_PASSWORD: password
      MYSQL_DATABASE: bachelor
    volumes:
      - mariadb_data:/var/lib/mysql
    ports:
      - 3306:3306

  phpmyadmin:
    image: phpmyadmin/phpmyadmin
    container_name: bachelor_admin
    depends_on:
      - mariadb
    environment:
      PMA_HOST: mariadb
      MYSQL_ROOT_PASSWORD: password
    ports:
      - 8080:80
volumes:
  mariadb_data:


